<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RYNEX | Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --bg: #030406; }
        body { 
            background-color: var(--bg); 
            font-family: 'Space Grotesk', sans-serif; 
            color: #ffffff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        /* Animated Background Pulse */
        .bg-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(0, 242, 255, 0.05) 0%, transparent 70%);
            z-index: 0;
            animation: pulse 8s infinite alternate;
        }

        @keyframes pulse {
            0% { opacity: 0.3; transform: scale(1); }
            100% { opacity: 0.7; transform: scale(1.1); }
        }

        .auth-card {
            background: rgba(10, 12, 16, 0.8);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(0, 242, 255, 0.2);
            width: 100%;
            max-width: 450px;
            z-index: 10;
        }

        .input-field {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }

        .input-field:focus {
            border-color: var(--neon);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
            outline: none;
        }

        .tab-active {
            color: var(--neon);
            border-bottom: 2px solid var(--neon);
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="auth-card p-10 rounded-2xl shadow-2xl">
        <div class="text-center mb-10">
            <div class="inline-block w-12 h-12 border-2 border-cyan-400 rotate-45 mb-4">
                <div class="-rotate-45 flex items-center justify-center h-full font-bold text-cyan-400 text-xl">R</div>
            </div>
            <h1 class="text-2xl font-bold tracking-widest uppercase">Rynex<span class="text-cyan-400">Portal</span></h1>
            <p class="text-[10px] font-mono text-gray-500 mt-2 uppercase tracking-[0.3em]">Authorized Personnel Only</p>
        </div>

        <div class="flex border-b border-white/10 mb-8 text-xs font-bold uppercase tracking-widest">
            <button id="loginTab" onclick="switchTab('login')" class="flex-1 pb-4 tab-active transition">Login</button>
            <button id="registerTab" onclick="switchTab('register')" class="flex-1 pb-4 text-gray-500 hover:text-white transition">Register Org</button>
        </div>

        <form id="loginForm" class="space-y-6">
            <div class="space-y-1">
                <label class="text-[10px] font-mono text-cyan-500 uppercase">Operator ID (Email)</label>
                <input type="email" placeholder="admin@rynex.sec" class="w-full p-4 rounded-lg input-field text-sm">
            </div>
            <div class="space-y-1">
                <label class="text-[10px] font-mono text-cyan-500 uppercase">Security Token (Password)</label>
                <input type="password" placeholder="••••••••" class="w-full p-4 rounded-lg input-field text-sm">
            </div>
            <div class="flex justify-between items-center text-[11px]">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" class="accent-cyan-500"> Remember Terminal
                </label>
                <a href="#" class="text-cyan-400 hover:underline">Forgot Token?</a>
            </div>
            <button class="w-full py-4 bg-cyan-500 text-black font-black rounded-lg hover:bg-white transition-all duration-300 uppercase text-xs tracking-widest">
                Initialize Session
            </button>
        </form>

        <form id="registerForm" class="hidden space-y-5">
            <div class="space-y-1">
                <label class="text-[10px] font-mono text-cyan-500 uppercase">Organization Name</label>
                <input type="text" placeholder="Global Tech Corp" class="w-full p-3 rounded-lg input-field text-sm">
            </div>
            <div class="space-y-1">
                <label class="text-[10px] font-mono text-cyan-500 uppercase">Work Email</label>
                <input type="email" placeholder="security@corp.com" class="w-full p-3 rounded-lg input-field text-sm">
            </div>
            <div class="space-y-1">
                <label class="text-[10px] font-mono text-cyan-500 uppercase">Security Tier</label>
                <select class="w-full p-3 rounded-lg input-field text-sm bg-[#0B0E14] text-gray-400">
                    <option>Standard Audit (VAPT)</option>
                    <option>Enterprise Defense (SOC)</option>
                    <option>Incident Response Retainer</option>
                </select>
            </div>
            <div class="space-y-1">
                <label class="text-[10px] font-mono text-cyan-500 uppercase">Master Password</label>
                <input type="password" placeholder="••••••••" class="w-full p-3 rounded-lg input-field text-sm">
            </div>
            <button class="w-full py-4 bg-white text-black font-black rounded-lg hover:bg-cyan-500 transition-all duration-300 uppercase text-xs tracking-widest">
                Create Organization Account
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-white/5 text-center">
            <p class="text-[9px] font-mono text-gray-600 leading-relaxed uppercase">
                Warning: Unauthorized access attempts are logged and reported to local cybercrime units. <br>Your IP: <span class="text-cyan-800">192.168.1.1</span>
            </p>
        </div>
    </div>

    <script>
        function switchTab(type) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const loginTab = document.getElementById('loginTab');
            const registerTab = document.getElementById('registerTab');

            if (type === 'login') {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                loginTab.classList.add('tab-active');
                registerTab.classList.remove('tab-active');
                registerTab.classList.add('text-gray-500');
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                registerTab.classList.add('tab-active');
                loginTab.classList.remove('tab-active');
                loginTab.classList.add('text-gray-500');
            }
        }
    </script>
</body>
</html>
