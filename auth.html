<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RYNEX SECURITY — ACCESS PORTAL</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cyan: #00d4ff;
      --blue: #0057ff;
      --bg: #020509;
      --surface: #060d14;
      --border: rgba(0,212,255,0.18);
      --border-dim: rgba(0,212,255,0.07);
      --text: #cde8f0;
      --muted: #2a4a5a;
      --error: #ff3c5a;
    }

    body {
      background: var(--bg);
      font-family: 'Rajdhani', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px);
      pointer-events: none; z-index: 200;
    }

    .bg-grid {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      animation: gridDrift 20s linear infinite; z-index: 0;
    }
    @keyframes gridDrift { 0%{background-position:0 0} 100%{background-position:48px 48px} }

    .orb1 { position:fixed; width:700px; height:700px; background:radial-gradient(circle,rgba(0,87,255,0.12) 0%,transparent 65%); top:-200px; left:-200px; z-index:0; animation:floatA 12s ease-in-out infinite alternate; }
    .orb2 { position:fixed; width:500px; height:500px; background:radial-gradient(circle,rgba(0,212,255,0.08) 0%,transparent 65%); bottom:-100px; right:-100px; z-index:0; animation:floatB 9s ease-in-out infinite alternate; }
    @keyframes floatA { 0%{transform:translate(0,0)} 100%{transform:translate(60px,40px)} }
    @keyframes floatB { 0%{transform:translate(0,0)} 100%{transform:translate(-40px,-30px)} }

    .scan-line { position:fixed; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--cyan),transparent); opacity:0.12; z-index:6; animation:scanDown 8s linear infinite; }
    @keyframes scanDown { 0%{top:-2px} 100%{top:100vh} }

    .corner { position:fixed; width:60px; height:60px; z-index:5; }
    .c-tl { top:20px; left:20px; border-top:1px solid var(--cyan); border-left:1px solid var(--cyan); }
    .c-tr { top:20px; right:20px; border-top:1px solid var(--cyan); border-right:1px solid var(--cyan); }
    .c-bl { bottom:20px; left:20px; border-bottom:1px solid var(--cyan); border-left:1px solid var(--cyan); }
    .c-br { bottom:20px; right:20px; border-bottom:1px solid var(--cyan); border-right:1px solid var(--cyan); }

    .status-bar { position:fixed; bottom:0; left:0; right:0; padding:8px 24px; display:flex; justify-content:space-between; font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--muted); letter-spacing:0.2em; border-top:1px solid var(--border-dim); z-index:50; }
    .blink-dot { display:inline-block; width:5px; height:5px; background:var(--cyan); border-radius:50%; margin-right:8px; animation:blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .auth-wrapper { position:relative; z-index:20; width:100%; max-width:460px; padding:0 20px; animation:fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:translateY(0)} }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 52px 48px;
      position: relative;
      box-shadow: 0 0 80px rgba(0,212,255,0.06), inset 0 1px 0 rgba(0,212,255,0.1);
    }
    .auth-card::before { content:''; position:absolute; top:-1px; left:20%; right:20%; height:1px; background:linear-gradient(90deg,transparent,var(--cyan),transparent); }

    .logo-area { text-align:center; margin-bottom:44px; }
    .logo-hex { display:inline-block; width:64px; height:64px; margin-bottom:18px; }
    .logo-hex svg { width:100%; height:100%; }
    .logo-name { font-size:24px; font-weight:700; letter-spacing:0.35em; text-transform:uppercase; }
    .logo-name em { color:var(--cyan); font-style:normal; }
    .logo-sub { font-family:'Share Tech Mono',monospace; font-size:8px; color:var(--muted); letter-spacing:0.45em; text-transform:uppercase; margin-top:6px; }

    .tabs { display:flex; border-bottom:1px solid var(--border-dim); margin-bottom:36px; }
    .tab-btn { flex:1; background:none; border:none; color:var(--muted); font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:0.3em; text-transform:uppercase; padding:12px 0; cursor:pointer; transition:0.2s; position:relative; }
    .tab-btn.active { color:var(--cyan); }
    .tab-btn.active::after { content:''; position:absolute; bottom:-1px; left:0; right:0; height:2px; background:var(--cyan); box-shadow:0 0 8px var(--cyan); }
    .tab-btn:hover:not(.active) { color:var(--text); }

    .form { display:flex; flex-direction:column; gap:18px; }
    .form.hidden { display:none; }
    .field { display:flex; flex-direction:column; gap:6px; }
    .field label { font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--cyan); letter-spacing:0.3em; text-transform:uppercase; }
    .pw-wrap { position:relative; }
    .field input { background:rgba(0,212,255,0.03); border:1px solid rgba(0,212,255,0.12); color:var(--text); font-family:'Share Tech Mono',monospace; font-size:13px; padding:13px 16px; outline:none; transition:0.25s; width:100%; }
    .field input:focus { border-color:var(--cyan); background:rgba(0,212,255,0.05); box-shadow:0 0 16px rgba(0,212,255,0.08); }
    .field input.invalid { border-color:var(--error); }
    .field input::placeholder { color:var(--muted); }
    .field-error { font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--error); letter-spacing:0.12em; min-height:12px; }
    .pw-toggle { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--muted); cursor:pointer; font-family:'Share Tech Mono',monospace; font-size:9px; }
    .pw-toggle:hover { color:var(--cyan); }

    .strength-bar { display:flex; gap:3px; margin-top:5px; }
    .seg { height:2px; flex:1; background:rgba(255,255,255,0.05); transition:background 0.3s; }

    .btn-submit { background:transparent; border:1px solid var(--cyan); color:var(--cyan); font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:700; letter-spacing:0.35em; text-transform:uppercase; padding:15px; cursor:pointer; transition:0.25s; position:relative; overflow:hidden; margin-top:6px; width:100%; }
    .btn-submit::before { content:''; position:absolute; inset:0; background:var(--cyan); transform:scaleX(0); transform-origin:left; transition:transform 0.3s ease; z-index:0; }
    .btn-submit span { position:relative; z-index:1; }
    .btn-submit:hover::before { transform:scaleX(1); }
    .btn-submit:hover { color:#020509; box-shadow:0 0 24px rgba(0,212,255,0.3); }
    .btn-submit:disabled { opacity:0.4; cursor:not-allowed; }

    .alert { font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:0.1em; padding:11px 14px; border-left:2px solid; display:none; line-height:1.5; margin-bottom:4px; }
    .alert.error { border-color:var(--error); color:var(--error); background:rgba(255,60,90,0.06); }
    .alert.success { border-color:var(--cyan); color:var(--cyan); background:rgba(0,212,255,0.05); }
    .alert.show { display:block; }

    .note { text-align:center; font-family:'Share Tech Mono',monospace; font-size:8px; color:var(--muted); letter-spacing:0.15em; margin-top:12px; }
    .hp-field { position:absolute; left:-9999px; top:-9999px; visibility:hidden; }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="orb1"></div><div class="orb2"></div>
  <div class="scan-line"></div>
  <div class="corner c-tl"></div><div class="corner c-tr"></div>
  <div class="corner c-bl"></div><div class="corner c-br"></div>

  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="logo-area">
        <div class="logo-hex">
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polygon points="32,3 60,18 60,46 32,61 4,46 4,18" stroke="#00d4ff" stroke-width="1.5" fill="rgba(0,212,255,0.05)"/>
            <polygon points="32,12 52,23 52,41 32,52 12,41 12,23" stroke="rgba(0,212,255,0.25)" stroke-width="0.8" fill="none"/>
            <text x="32" y="38" text-anchor="middle" fill="#00d4ff" font-family="Rajdhani,sans-serif" font-size="20" font-weight="700">R</text>
          </svg>
        </div>
        <div class="logo-name">RYNEX<em>SEC</em></div>
        <div class="logo-sub">Authorized Personnel Only</div>
      </div>

      <div class="tabs">
        <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">Login</button>
        <button class="tab-btn" id="registerTab" onclick="switchTab('register')">Register</button>
      </div>

      <div id="alertBox" class="alert"></div>

      <form id="loginForm" class="form" novalidate autocomplete="off" onsubmit="handleLogin(event)">
        <input class="hp-field" type="text" name="website" tabindex="-1" autocomplete="off">
        <div class="field">
          <label for="loginEmail">Operator ID</label>
          <input type="email" id="loginEmail" placeholder="operator@rynex.sec" maxlength="254" autocomplete="username">
          <div class="field-error" id="loginEmailErr"></div>
        </div>
        <div class="field">
          <label for="loginPass">Security Token</label>
          <div class="pw-wrap">
            <input type="password" id="loginPass" placeholder="••••••••••••" maxlength="128" autocomplete="current-password">
            <button type="button" class="pw-toggle" onclick="togglePw('loginPass',this)">SHOW</button>
          </div>
          <div class="field-error" id="loginPassErr"></div>
        </div>
        <button type="submit" class="btn-submit" id="loginBtn"><span>Initialize Session</span></button>
        <p class="note">⚑ All connections are encrypted and monitored</p>
      </form>

      <form id="registerForm" class="form hidden" novalidate autocomplete="off" onsubmit="handleRegister(event)">
        <input class="hp-field" type="text" name="website" tabindex="-1" autocomplete="off">
        <div class="field">
          <label for="regEmail">Work Email</label>
          <input type="email" id="regEmail" placeholder="security@corp.com" maxlength="254" autocomplete="email">
          <div class="field-error" id="regEmailErr"></div>
        </div>
        <div class="field">
          <label for="regPass">Master Password</label>
          <div class="pw-wrap">
            <input type="password" id="regPass" placeholder="min. 12 characters" maxlength="128" autocomplete="new-password" oninput="checkStrength(this.value)">
            <button type="button" class="pw-toggle" onclick="togglePw('regPass',this)">SHOW</button>
          </div>
          <div class="strength-bar">
            <div class="seg" id="s1"></div><div class="seg" id="s2"></div>
            <div class="seg" id="s3"></div><div class="seg" id="s4"></div>
          </div>
          <div class="field-error" id="regPassErr"></div>
        </div>
        <div class="field">
          <label for="regConfirm">Confirm Password</label>
          <div class="pw-wrap">
            <input type="password" id="regConfirm" placeholder="••••••••••••" maxlength="128" autocomplete="new-password">
            <button type="button" class="pw-toggle" onclick="togglePw('regConfirm',this)">SHOW</button>
          </div>
          <div class="field-error" id="regConfirmErr"></div>
        </div>
        <button type="submit" class="btn-submit" id="regBtn"><span>Create Account</span></button>
        <p class="note">⚑ Registrations are reviewed before activation</p>
      </form>
    </div>
  </div>

  <div class="status-bar">
    <span><span class="blink-dot"></span>TLS 1.3 SECURE CHANNEL</span>
    <span id="clock"></span>
    <span>AES-256 ENCRYPTED</span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL='https://tkbiwqwbfshsghlasadh.supabase.co', SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrYml3cXdiZnNoc2dobGFzYWRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNDA4MjQsImV4cCI6MjA4ODcxNjgyNH0.1wIw9GU7oCaBRvw-HUsQUZAqrZLGl9v6BhKMqgSEUk0';
    const RATE={max:5,window:15*60*1000};
    function escapeHtml(s){const d=document.createElement('div');d.appendChild(document.createTextNode(String(s)));return d.innerHTML;}
    function sanitize(s){return String(s).replace(/<[^>]*>/g,'').trim();}
    function isValidEmail(e){return /^[^\s@<>'"]{1,64}@[^\s@<>'"]{1,255}\.[a-zA-Z]{2,}$/.test(e);}
    function validatePassword(p){
      if(p.length<12)return'Minimum 12 characters';
      if(!/[A-Z]/.test(p))return'Needs an uppercase letter';
      if(!/[a-z]/.test(p))return'Needs a lowercase letter';
      if(!/[0-9]/.test(p))return'Needs a number';
      if(!/[^A-Za-z0-9]/.test(p))return'Needs a special character';
      return null;
    }
    function checkRateLimit(key){
      const now=Date.now();let d;
      try{d=JSON.parse(localStorage.getItem(key)||'null');}catch{d=null;}
      if(!d||now-d.start>RATE.window)d={start:now,count:0};
      d.count++;localStorage.setItem(key,JSON.stringify(d));
      if(d.count>RATE.max){const m=Math.ceil((RATE.window-(now-d.start))/60000);return`Too many attempts. Try again in ${m} min.`;}
      return null;
    }
    function showAlert(msg,type='error'){const el=document.getElementById('alertBox');el.textContent=escapeHtml(msg);el.className=`alert ${type} show`;}
    function clearAlert(){document.getElementById('alertBox').className='alert';}
    function setErr(id,msg){const e=document.getElementById(id);if(e)e.textContent=msg;}
    function clearErrors(){document.querySelectorAll('.field-error').forEach(e=>e.textContent='');document.querySelectorAll('.invalid').forEach(e=>e.classList.remove('invalid'));clearAlert();}
    function setLoading(id,on,text,loading){const b=document.getElementById(id);b.disabled=on;b.querySelector('span').textContent=on?loading:text;}
    function togglePw(id,btn){const i=document.getElementById(id);i.type=i.type==='password'?'text':'password';btn.textContent=i.type==='password'?'SHOW':'HIDE';}
    function checkStrength(pw){
      const c=['#ff3c5a','#ff7700','#00aaff','#00d4ff'];let s=0;
      if(pw.length>=12)s++;if(/[A-Z]/.test(pw)&&/[a-z]/.test(pw))s++;if(/[0-9]/.test(pw))s++;if(/[^A-Za-z0-9]/.test(pw))s++;
      for(let i=1;i<=4;i++)document.getElementById('s'+i).style.background=i<=s?c[s-1]:'rgba(255,255,255,0.05)';
    }
    function switchTab(tab){
      clearErrors();
      document.getElementById('loginForm').classList.toggle('hidden',tab!=='login');
      document.getElementById('registerForm').classList.toggle('hidden',tab!=='register');
      document.getElementById('loginTab').className='tab-btn'+(tab==='login'?' active':'');
      document.getElementById('registerTab').className='tab-btn'+(tab==='register'?' active':'');
    }
    function updateClock(){document.getElementById('clock').textContent=new Date().toISOString().slice(0,19).replace('T',' ')+' UTC';}
    updateClock();setInterval(updateClock,1000);

    let _sup=null;
    try{if(typeof supabase!=='undefined'&&SUPABASE_URL!=='YOUR_SUPABASE_URL')_sup=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);}catch(e){}

    async function handleLogin(e){
      e.preventDefault();clearErrors();
      if(e.target.querySelector('.hp-field').value)return;
      const email=sanitize(document.getElementById('loginEmail').value);
      const pass=document.getElementById('loginPass').value;
      let ok=true;
      if(!email||!isValidEmail(email)){setErr('loginEmailErr','⚠ Valid email required');document.getElementById('loginEmail').classList.add('invalid');ok=false;}
      if(!pass||pass.length<8){setErr('loginPassErr','⚠ Password required');document.getElementById('loginPass').classList.add('invalid');ok=false;}
      if(!ok)return;
      const rl=checkRateLimit('rynex_login');if(rl){showAlert(rl);return;}
      setLoading('loginBtn',true,'Initialize Session','Verifying...');
      try{
        if(!_sup)throw new Error('Configure Supabase credentials to enable auth.');
        const{error}=await _sup.auth.signInWithPassword({email,password:pass});
        if(error)throw error;
        showAlert('Access granted. Redirecting...','success');
        setTimeout(()=>window.location.href='index.html',1200);
      }catch(err){showAlert('ACCESS DENIED: '+escapeHtml(err.message));setLoading('loginBtn',false,'Initialize Session','');}
    }

    async function handleRegister(e){
      e.preventDefault();clearErrors();
      if(e.target.querySelector('.hp-field').value)return;
      const email=sanitize(document.getElementById('regEmail').value);
      const pass=document.getElementById('regPass').value;
      const confirm=document.getElementById('regConfirm').value;
      let ok=true;
      if(!email||!isValidEmail(email)){setErr('regEmailErr','⚠ Valid email required');document.getElementById('regEmail').classList.add('invalid');ok=false;}
      const pe=validatePassword(pass);if(pe){setErr('regPassErr','⚠ '+pe);document.getElementById('regPass').classList.add('invalid');ok=false;}
      if(pass!==confirm){setErr('regConfirmErr','⚠ Passwords do not match');document.getElementById('regConfirm').classList.add('invalid');ok=false;}
      if(!ok)return;
      const rl=checkRateLimit('rynex_register');if(rl){showAlert(rl);return;}
      setLoading('regBtn',true,'Create Account','Encrypting...');
      try{
        if(!_sup)throw new Error('Configure Supabase credentials to enable auth.');
        const{error}=await _sup.auth.signUp({email,password:pass});
        if(error)throw error;
        showAlert('Account created. Check your email to verify.','success');
        switchTab('login');
      }catch(err){showAlert('FAILED: '+escapeHtml(err.message));setLoading('regBtn',false,'Create Account','');}
    }
  </script>
</body>
</html>
